<body>

<header class="site-header">
  <div class="container header-inner">

    <a href="index.html" class="logo" aria-label="CIRS Home">
      <svg width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6ea8ff"/>
            <stop offset="100%" stop-color="#2347ff"/>
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="28" fill="url(#g1)"></circle>
        <path d="M32 14l14 36H18L32 14z" fill="#fff"></path>
        <circle cx="32" cy="44" r="3" fill="#2347ff"></circle>
      </svg>
      <span>CIRS</span>
    </a>

    <nav class="nav">
      <ul id="menu" class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="createreport.html">Create Report</a></li>
        <li><a href="viewreports.html">View Reports</a></li>
        <li><a href="map.html">Map</a></li>
        <li>
          <a href="notifications.html">
            Notifications
            <span id="notifBadge" class="badge" style="display:none">0</span>
          </a>
        </li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </nav>

  </div>
</header>

<main class="page container">
  <button
    class="btn btn-ghost"
    style="margin-bottom: 16px;"
    onclick="goBack()"
  >
    ← Back
  </button>

  <h1>Notifications</h1>
  <div id="list"></div>
</main>

<script src="assets/js/main.js"></script>
<script>
const API = "http://127.0.0.1:8000";

async function loadNotifications(){
  const res = await fetch(`${API}/notifications/`, {
    headers: { "Authorization": `Bearer ${getToken()}` }
  });

  const data = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(n => {
    const div = document.createElement("div");
    div.className = "card";
    if(!n.is_read) div.style.borderColor = "#2347ff";

    div.innerHTML = `
      <div style="display:flex; justify-content:space-between; align-items:center; gap:12px">
        <div>
          <p><strong>${formatNotificationText(n)}</strong></p>
          <small>${new Date(n.created_at).toLocaleString()}</small>
        </div>

        <button class="btn btn-ghost">View</button>
      </div>
    `;

    div.querySelector("button").onclick = async (e) => {
  e.stopPropagation();

  await fetch(`${API}/notifications/${n.id}/read`, {
    method: "POST",
    headers: { "Authorization": `Bearer ${getToken()}` }
  });

  window.location.href = `report.html?id=${n.report_id}`;
};


    div.onclick = async () => {
      await fetch(`${API}/notifications/${n.id}/read`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${getToken()}` }
      });
      window.location.href = `report.html?id=${n.report_id}`;
    };

    list.appendChild(div);
  });
}

requireAuth();

function formatNotificationText(n) {

  if (n.message) return n.message;


  if (n.type === "like") return `${n.actor} liked your report`;
  if (n.type === "dislike") return `${n.actor} disliked your report`;
  if (n.type === "comment") return `${n.actor} commented on your report`;

  if (n.type === "approved")
    return `Your report has been approved ✅`;

  if (n.type === "rejected")
    return `Your report has been rejected ❌`;
  
  return "New notification";
}

function goBack() {
  if (window.history.length > 1) {
    window.history.back();
  } else {
    window.location.href = "index.html";
  }
}



loadNotifications();
</script>
<script src="assets/js/chatbot.js"></script>
</body>
</html>
