<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CIRS – Report Details</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    .page { padding: 16px 0 32px; }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .imgwrap {
      max-width: 720px;
      border-radius: 14px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin: 0 auto 14px auto;
    }
    .imgwrap img {
      width: 100%;
      height: auto;
      display: block;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 6px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 12px;
      color: #bcd0ff;
    }
    .actions {
      margin-top: 12px;
    }
    .comment {
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }
    textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 12px;
      padding: 10px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      border: 1px solid var(--border);
    }
  </style>
</head>

<body>

<!-- ===== HEADER (UNCHANGED STYLE) ===== -->
<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="logo">
      <svg width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6ea8ff"/>
            <stop offset="100%" stop-color="#2347ff"/>
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="28" fill="url(#g1)"></circle>
        <path d="M32 14l14 36H18L32 14z" fill="#fff"></path>
        <circle cx="32" cy="44" r="3" fill="#2347ff"></circle>
      </svg>
      <span>CIRS</span>
    </a>

    <nav class="nav">
      <ul id="menu" class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="createreport.html">Create Report</a></li>
        <li><a href="viewreports.html">View Reports</a></li>
        <li><a href="map.html">Map</a></li>
        <li>
          <a href="notifications.html">
            Notifications
            <span id="notifBadge" class="badge" style="display:none">0</span>
          </a>
        </li>
        <li><a href="profile.html">Profile</a></li>
      </ul>
    </nav>
  </div>
</header>

<!-- ===== MAIN ===== -->
<main class="page">
  <div style="
    max-width:1200px;
    margin:0 auto 16px auto;
    padding-left:8px;
    display:flex;
    align-items:center;
    gap:12px;
  ">
    <button class="btn btn-ghost" onclick="goBack()">← Back</button>
    <h1 id="reportTitle" style="margin:0"></h1>
  </div>

  <div class="container">

    <div id="reportCard" class="card"></div>

    <div class="actions">
      <button class="btn" id="likeBtn">👍 Like (<span id="likeCount">0</span>)</button>
      <button class="btn" id="dislikeBtn">👎 Dislike (<span id="dislikeCount">0</span>)</button>
    </div>

    <h3 style="margin-top:24px">Comments</h3>
    <div id="comments"></div>

    <div id="commentBox" style="margin-top:10px">
      <textarea id="commentInput" placeholder="Write a comment..."></textarea>
      <button class="btn btn-primary" id="commentBtn">Post Comment</button>
    </div>

  </div>
</main>

<script src="assets/js/main.js"></script>
<script>
const API = "https://fyp2-backend-qp13.onrender.com";
const params = new URLSearchParams(window.location.search);
const reportId = params.get("id");

/* ---------- LOAD REPORT ---------- */
async function loadReport() {
  const res = await fetch(`${API}/reports/public/${reportId}`);
  const r = await res.json();

  document.getElementById("reportTitle").textContent = r.title;

  document.getElementById("reportCard").innerHTML = `
    ${r.image_path ? `
      <div class="imgwrap">
        <img src="${API}/${r.image_path}">
      </div>` : ``}

    <p style="color:#9aa4c7">Reported by ${r.username || "User " + r.user_id}</p>
    <p><strong>Location:</strong> ${r.location}</p>
    <span class="badge">${r.status}</span>

    <p style="margin-top:12px">${r.description}</p>
  `;
}

function formatTime(date){
  const seconds = Math.floor((new Date() - date) / 1000);

  if(seconds < 60) return "just now";
  if(seconds < 3600) return Math.floor(seconds/60) + " mins ago";
  if(seconds < 86400) return Math.floor(seconds/3600) + " hours ago";

  // ✅ more than 1 day → show FULL date + time
  return date.toLocaleString("en-MY", {
    day: "numeric",
    month: "short",
    year: "numeric",
    hour: "2-digit",
    minute: "2-digit"
  });
}

/* ---------- LOAD COMMENTS ---------- */
async function loadComments() {
  const res = await fetch(`${API}/comments/reports/${reportId}/comments`)
  const data = await res.json();
  data.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
  const commentsDiv = document.getElementById("comments");
  commentsDiv.innerHTML = "";

data.forEach(c => {
  const div = document.createElement("div");
  div.className = "comment";
  div.id = `comment-${c.id}`;

  const currentUserId = parseInt(localStorage.getItem("user_id"));
  console.log("COMMENT USER:", c.user_id);
  console.log("CURRENT USER:", currentUserId);
  const isOwner = c.user_id === currentUserId;

  const date = new Date(c.created_at);
  const formatted = formatTime(date);

  div.innerHTML = `
    <p>
      <strong>${c.username}</strong>
      <span class="meta">• ${formatted}</span>
    </p>

    <p id="text-${c.id}">${c.content}</p>

    ${
      isOwner
        ? `
        <button onclick="startEdit(${c.id})">Edit</button>
        <button onclick="deleteComment(${c.id})">Delete</button>
      `
        : ""
    }
  `;

  commentsDiv.appendChild(div);
});
}

async function deleteComment(id){
  if(!confirm("Delete?")) return;

  await fetch(`${API}/comments/${id}`, {
    method: "DELETE",
    headers: {
      "Authorization": `Bearer ${getToken()}`
    }
  });

  loadComments();
}

function startEdit(id) {
  const commentDiv = document.getElementById(`comment-${id}`);
  const textEl = document.getElementById(`text-${id}`);
  const oldText = textEl.textContent;

  commentDiv.innerHTML = `
    <p><strong>${localStorage.getItem("username")}</strong></p>

    <textarea id="edit-${id}" style="width:100%; margin-top:6px;">
${oldText}
    </textarea>

    <div style="margin-top:8px;">
      <button onclick="saveEdit(${id})">Save</button>
      <button onclick="cancelEdit(${id}, \`${oldText}\`)">Cancel</button>
    </div>
  `;
}

async function saveEdit(id) {
  const newText = document.getElementById(`edit-${id}`).value;

  const formData = new FormData();
  formData.append("content", newText);

  await fetch(`${API}/comments/${id}`, {
    method: "PUT",
    headers: {
      "Authorization": `Bearer ${getToken()}`
    },
    body: formData
  });

  loadComments();
}

function cancelEdit(id, oldText) {
  loadComments(); // easiest and cleanest
}

/* ---------- POST COMMENT ---------- */
document.getElementById("commentBtn").onclick = async () => {
  const content = document.getElementById("commentInput").value.trim();
  if (!content) return;

  const form = new FormData();
  form.append("content", content);

  await fetch(`${API}/comments/reports/${reportId}/comments`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${getToken()}`
    },
    body: form
  });

  document.getElementById("commentInput").value = "";
  loadComments();
};

/* ---------- INIT ---------- */
loadReport();
loadComments();
loadReactions();

document.getElementById("likeBtn").onclick = async () => {
  const form = new FormData();
  form.append("type", "like");

  await fetch(`${API}/reports/${reportId}/reaction`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${getToken()}`
    },
    body: form
  });

  loadReactions();
};

document.getElementById("dislikeBtn").onclick = async () => {
  const form = new FormData();
  form.append("type", "dislike");

  await fetch(`${API}/reports/${reportId}/reaction`, {
    method: "POST",
    headers: {
      "Authorization": `Bearer ${getToken()}`
    },
    body: form
  });

  loadReactions();
};

async function loadReactions() {
  const res = await fetch(`${API}/reports/${reportId}/reactions`);
  const data = await res.json();

  document.getElementById("likeCount").textContent = data.likes;
  document.getElementById("dislikeCount").textContent = data.dislikes;
}

function goBack() {
  if (history.length > 1) {
    history.back();
  } else {
    window.location.href = "profile.html";
  }
}



</script>

<script src="assets/js/chatbot.js"></script>
</body>
</html>
