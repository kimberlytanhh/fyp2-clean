<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CIRS – Incident Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Your existing styles -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    /* Map must have height */
    #map {
      height: 80vh;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

<header class="site-header">
  <!-- reuse your existing header if you have one -->
</header>

<main class="page container">

  <!-- Back button (simple, local) -->
  <button class="btn btn-ghost" style="margin-bottom:16px" onclick="goBack()">
    ← Back
  </button>

  <h1>Community Incident Map</h1>

  <!-- Map container -->
  <div id="map"></div>

</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  function goBack() {
    if (history.length > 1) history.back();
    else window.location.href = "index.html";
  }

  // ---------- INIT MAP ----------
  const map = L.map("map").setView([3.139, 101.6869], 12);
  // Default center: Kuala Lumpur (safe default)

  async function loadReportPins() {
  const res = await fetch("http://127.0.0.1:8000/reports/map");
  const reports = await res.json();

  reports.forEach(r => {
    if (!r.latitude || !r.longitude) return;

    const marker = L.marker([r.latitude, r.longitude]).addTo(map);

    marker.bindPopup(`
      <strong>${r.title}</strong><br>
      Status: ${r.status}<br>
      ${r.category ? `Category: ${r.category}<br>` : ""}
      <br>
      <a href="report.html?id=${r.id}" class="btn btn-ghost">View Report</a>
    `);
  });
}


  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  loadReportPins();

</script>

</body>
</html>
