<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CIRS – Incident Map</title>

  <!-- Leaflet CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Your existing styles -->
  <link rel="stylesheet" href="assets/css/styles.css" />

  <style>
    /* Map must have height */
    #map {
      height: 80vh;
      border-radius: 12px;
      box-shadow: var(--shadow);
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">

    <a href="index.html" class="logo" aria-label="CIRS Home">
      <svg width="28" height="28" viewBox="0 0 64 64" aria-hidden="true">
        <defs>
          <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#6ea8ff"/>
            <stop offset="100%" stop-color="#2347ff"/>
          </linearGradient>
        </defs>
        <circle cx="32" cy="32" r="28" fill="url(#g1)"></circle>
        <path d="M32 14l14 36H18L32 14z" fill="#fff"></path>
        <circle cx="32" cy="44" r="3" fill="#2347ff"></circle>
      </svg>
      <span>CIRS</span>
    </a>

    <nav class="nav" aria-label="Primary">
      <button class="nav-toggle" aria-controls="menu" aria-expanded="false">
        <div class="bar"></div>
        <div class="bar"></div>
        <div class="bar"></div>
      </button>

      <ul id="menu" class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="createreport.html">Create Report</a></li>
        <li><a href="viewreports.html">View Reports</a></li>
        <li><a class="active" href="map.html">Map</a></li>
        <li>
          <a href="notifications.html">
            Notifications
            <span id="notifBadge" class="badge" style="display:none">0</span>
          </a>
        </li>
        <li><a href="profile.html">Profile</a></li>
      </ul>

    </nav>

  </div>
</header>

<main class="page container">

  <!-- Back button (simple, local) -->
  <button class="btn btn-ghost" style="margin-bottom:16px" onclick="goBack()">
    ← Back
  </button>

  <h1>Community Incident Map</h1>

  <!-- Map container -->
  <div id="map"></div>

</main>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  function goBack() {
    if (history.length > 1) history.back();
    else window.location.href = "index.html";
  }

  // ---------- INIT MAP ----------
  const map = L.map("map").setView([4.3340, 101.1350], 15);

  async function loadReportPins() {
  const res = await fetch("http://127.0.0.1:8000/reports/map");
  const reports = await res.json();

  reports.forEach(r => {
    if (!r.latitude || !r.longitude) return;

    const marker = L.marker([r.latitude, r.longitude]).addTo(map);

    marker.bindPopup(`
      <strong>${r.title}</strong><br>
      Status: ${r.status}<br>
      ${r.category ? `Category: ${r.category}<br>` : ""}
      <br>
      <a href="report.html?id=${r.id}" class="btn btn-ghost">View Report</a>
    `);
  });
}


  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; OpenStreetMap contributors"
  }).addTo(map);

  loadReportPins();

</script>
<script src="assets/js/main.js"></script>
<script src="assets/js/chatbot.js"></script>
</body>
</html>
