<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>All Reports | CIRS Admin</title>

<link rel="stylesheet" href="../assets/css/styles.css">
<link rel="stylesheet" href="../assets/css/admin.css">

</head>

<body>

<header class="site-header">
  <div class="container">
    <a href="moderation.html" class="logo">← Back</a>
  </div>
</header>

<div class="admin-layout" style="height:100vh;">

  <!-- SIDEBAR -->
  <aside id="adminSidebar" class="admin-sidebar" style="
    display:flex;
    flex-direction:column;
    height:100%;
  ">
    <div class="sidebar-header">
      <span>Admin Menu</span>
    </div>

    <ul style="flex:1;">
      <li onclick="location.href='dashboard.html'">
        <span class="text">Dashboard</span>
      </li>

      <li onclick="location.href='moderation.html'">
        <span class="text">Moderation</span>
      </li>

      <li onclick="location.href='reports.html'">
        <span class="text">Reports</span>
      </li>

      <li onclick="location.href='analytics.html'">
        <span class="text">Analytics</span>
      </li>

      <li onclick="location.href='chatbot.html'">
        <span class="text">Chatbot</span>
      </li>
    </ul>
    <div style="padding:15px; border-top:1px solid rgba(255,255,255,0.1); margin-bottom:80px;">
      <button onclick="confirmLogout()" class="btn btn-danger" style="width:100%;">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="admin-content">

    <h1 id="pageTitle">All Reports</h1>

    <div class="content-wrapper">

      <div id="fullReports" class="full-grid"></div>

      <div class="pagination">
        <button onclick="prevPage()">Prev</button>
        <span id="pageInfo"></span>
        <button onclick="nextPage()">Next</button>
      </div>

    </div>

  </main>
</div>


<script src="../assets/js/admin/layout.js"></script>
<script src="../assets/js/admin/moderation.js"></script>
<script src="../assets/js/admin/moderation-full.js"></script>
<div id="reviewModal" class="modal">
  <div class="modal-content" id="modalContent"></div>
</div>
<div id="logoutModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <div style="
    background:#0b1437;
    padding:20px;
    border-radius:12px;
    width:300px;
    text-align:center;
    color:white;
  ">
    <h3>Sign Out</h3>
    <p>Are you sure you want to log out?</p>

    <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
      <button onclick="logout()" class="btn btn-danger">Yes</button>
      <button onclick="closeLogout()" class="btn">Cancel</button>
    </div>
  </div>
</div>

<script src="../assets/js/logout.js"></script>

</body>
</html>
