<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Moderation Queue | CIRS Admin</title>
<script>
  const role = localStorage.getItem("role");

  if (role !== "admin") {
    window.location.href = "../login.html";
  }
</script>

<link rel="stylesheet" href="../assets/css/styles.css">
<link rel="stylesheet" href="../assets/css/admin.css">

</head>

<body>

<header class="site-header">
  <div class="container">
    <a href="../index.html" class="logo">CIRS Admin</a>

    <nav>
      <ul class="menu">
        <li>
          <button id="toggleSidebar" class="btn">☰</button>
        </li>
        <li>
          <a href="../index.html?admin=true">Back to Site</a>
        </li>
      </ul>
    </nav>
  </div>
</header>

<div class="admin-layout" style="height:100vh;">

  <!-- SIDEBAR -->
  <aside id="adminSidebar" class="admin-sidebar" style="
    display:flex;
    flex-direction:column;
    height:100%;
  ">
    <div class="sidebar-header">
      <span>Admin Menu</span>
    </div>

    <ul style="flex:1;">
      <li onclick="location.href='dashboard.html'">
        <span class="text">Dashboard</span>
      </li>

      <li onclick="location.href='moderation.html'">
        <span class="text">Moderation</span>
      </li>

      <li onclick="location.href='reports.html'">
        <span class="text">Reports</span>
      </li>

      <li onclick="location.href='analytics.html'">
        <span class="text">Analytics</span>
      </li>

      <li onclick="location.href='chatbot.html'">
        <span class="text">Chatbot</span>
      </li>
    </ul>
    <div style="padding:15px; border-top:1px solid rgba(255,255,255,0.1); margin-bottom:80px;">
      <button onclick="confirmLogout()" class="btn btn-danger" style="width:100%;">
        Sign Out
      </button>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
<main class="admin-content">

<h1>Moderation Queue</h1>
<p>Review AI-flagged reports and monitor posted reports.</p>

<div class="section-header">
  <h2>⚠ Flagged</h2>
  <button onclick="location.href='moderation-full.html?type=flagged'" class="view-all" >View All</button>
</div>

<div class="scroll-row">

<button class="scroll-btn left" onclick="scrollRow('flaggedReports',-1)">◀</button>

<div id="flaggedReports" class="report-row"></div>

<button class="scroll-btn right" onclick="scrollRow('flaggedReports',1)">▶</button>

</div>

<div class="section-header">
  <h2>✅ Approved</h2>
  <button onclick="location.href='moderation-full.html?type=approved'" class="view-all">
    View All
  </button>
</div>
<div class="scroll-row">
  <button class="scroll-btn left" onclick="scrollRow('approvedReports',-1)">◀</button>

  <div id="approvedReports" class="report-row"></div>

  <button class="scroll-btn right" onclick="scrollRow('approvedReports',1)">▶</button>
</div>

<div class="section-header">
  <h2>❌ Rejected</h2>
  <button onclick="location.href='moderation-full.html?type=rejected'" class="view-all">
    View All
  </button>
</div>
<div class="scroll-row">
  <button class="scroll-btn left" onclick="scrollRow('rejectedReports',-1)">◀</button>

  <div id="rejectedReports" class="report-row"></div>

  <button class="scroll-btn right" onclick="scrollRow('rejectedReports',1)">▶</button>
</div>

</main>

</div>

<script src="../assets/js/admin/layout.js"></script>
<script src="../assets/js/admin/moderation.js"></script>
<script src="../assets/js/chatbot.js"></script>

<div id="reviewModal" class="modal-overlay" style="display:none;">
  <div class="modal-card">
    <img id="modalImage" style="width:100%; max-height:200px; object-fit:cover;" />
    <h2 id="modalTitle"></h2>

    <p id="modalDescription"></p>

    <p><strong>Location:</strong> <span id="modalLocation"></span></p>

    <p id="severityRow" style="display:none;">
      <strong>Severity:</strong> <span id="modalSeverity"></span>
    </p>

    <div class="modal-actions">
      <button id="approveBtn" class="btn btn-primary">Approve</button>
      <button id="rejectBtn" class="btn">Reject</button>
      <button onclick="closeModal()" class="btn">Close</button>
    </div>

  </div>
</div>

<div id="logoutModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
  z-index:999;
">
  <div style="
    background:#0b1437;
    padding:20px;
    border-radius:12px;
    width:300px;
    text-align:center;
    color:white;
  ">
    <h3>Sign Out</h3>
    <p>Are you sure you want to log out?</p>

    <div style="margin-top:15px; display:flex; gap:10px; justify-content:center;">
      <button onclick="logout()" class="btn btn-danger">Yes</button>
      <button onclick="closeLogout()" class="btn">Cancel</button>
    </div>
  </div>
</div>

<script src="../assets/js/logout.js"></script>

</body>
</html>
