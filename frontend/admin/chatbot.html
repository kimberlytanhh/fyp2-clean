<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Chatbot | CIRS</title>
  <link rel="stylesheet" href="../assets/css/admin.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script defer src="../assets/js/admin/chatbot.js"></script>
</head>

<body>
  <!-- Top Bar -->
  <header class="admin-topbar">
    <div class="admin-topbar-left">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span class="admin-title">CIRS Admin</span>
    </div>
    <a href="../index.html" class="back-link">Back to Site</a>
  </header>

  <!-- Layout -->
  <div class="admin-layout">
    <!-- Sidebar -->
    <aside id="adminSidebar" class="admin-sidebar">
    <div class="sidebar-header">
      <span>Admin Menu</span>
    </div>

    <ul>
      <li class="active">
        <span class="icon">🏠</span>
        <span class="text">Dashboard</span>
      </li>
      <li onclick="location.href='reports.html'">
        <span class="icon">📄</span>
        <span class="text">Reports</span>
      </li>
      <li onclick="location.href='analytics.html'">
        <span class="icon">📊</span>
        <span class="text">Analytics</span>
      </li>
      <li onclick="location.href='chatbot.html'">
        <span class="icon">🤖</span>
        <span class="text">Chatbot</span>
      </li>
    </ul>
  </aside>

    <!-- Main Content -->
    <main class="admin-content">
      <h1>Admin Chatbot</h1>
      <p class="subtitle">
        Ask questions about reports, categories, system status, and trends.
      </p>

      <!-- Chat Container -->
      <div class="chat-container">
        <div class="chat-messages" id="chatMessages">
          <div class="chat-bot">
            👋 Hello Admin. How can I help you today?
          </div>
        </div>

        <!-- Input Bar -->
        <div class="chat-input-bar">
          <input
            type="text"
            id="chatInput"
            placeholder="Type your question..."
            autocomplete="off"
          />
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>
    </main>
  </div>
</body>
</html>
